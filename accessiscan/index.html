<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AccessiScan — AI Accessibility Testing</title>

<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Atkinson Hyperlegible','Open Sans',sans-serif;
background:#fafafa;
line-height:1.7;
color:#222;
}

:root{
--primary:#0066cc;
--border:#dee2e6;
--light:#f8f9fa;
--dark:#212529;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:2rem 0;
}

header{
background:white;
border-bottom:1px solid var(--border);
}

header .container{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:1.4rem;
font-weight:700;
color:var(--primary);
}

.hero{
background:var(--light);
text-align:center;
padding:4rem 0;
}

.hero h1{
font-size:2rem;
margin-bottom:1rem;
}

.hero p{
max-width:600px;
margin:auto;
margin-bottom:2rem;
color:#666;
}

.url-input{
width:100%;
padding:1rem;
border-radius:8px;
border:1px solid var(--border);
font-size:1rem;
margin-bottom:1rem;
}

button{
background:var(--primary);
color:white;
border:none;
padding:1rem 2rem;
border-radius:8px;
font-size:1rem;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:1rem;
font-weight:bold;
}

.result{
margin-top:2rem;
padding:1rem;
background:white;
border:1px solid var(--border);
border-radius:8px;
display:none;
}

footer{
background:var(--dark);
color:white;
padding:2rem;
text-align:center;
margin-top:3rem;
}

</style>

</head>

<body>

<header>
<div class="container">
<div class="logo">AccessiScan</div>
</div>
</header>

<section class="hero">

<div class="container">

<h1>AI Accessibility Testing</h1>

<p>
Test your website using AI-powered accessibility simulations including low vision,
screen readers, dyslexia users, and elderly navigation patterns.
</p>

<form id="scan-form">

<input
class="url-input"
type="url"
id="website-url"
placeholder="https://example.com"
required
>

<button type="submit">Run Accessibility Scan</button>

</form>

<div id="status" class="status"></div>

<div id="result" class="result"></div>

</div>

</section>

<footer>
<p>© 2026 AccessiScan</p>
</footer>

<script>

const form = document.getElementById("scan-form")
const status = document.getElementById("status")
const resultBox = document.getElementById("result")

form.addEventListener("submit", async function(e){

e.preventDefault()

const url = document.getElementById("website-url").value

status.innerText = "Running scan..."
resultBox.style.display = "none"

try{

const response = await fetch("/api/scan",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:url})
})

const result = await response.json()

status.innerText = "Scan complete"

resultBox.style.display = "block"

resultBox.innerHTML = `
<strong>Scan Result</strong><br><br>
Status: ${result.status}<br>
Text Length: ${result.text_length}<br>
Screenshot Captured: ${result.screenshot}
`

}catch(err){

status.innerText = "Scan failed"
console.error(err)

}

})

</script>

</body>
</html>
